name: Automatic Deploy to EC2.

on:
  workflow_run:
    workflows: ["Build and Push Docker Image to GHCR"]
    types:
      - completed
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Set owner to lowercase
        id: string
        run: echo "owner_lc=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Deploy Latest to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -e
            # Define names for both API and Worker services
            API_IMAGE="ghcr.io/${{ steps.string.outputs.owner_lc }}/mandateapi:dev-latest"
            WORKER_IMAGE="ghcr.io/${{ steps.string.outputs.owner_lc }}/mandateworker:dev-latest"
            API_CONTAINER="mandateapidev-container"
            WORKER_CONTAINER="mandateworker"

            echo "--- Logging in to GHCR ---"
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            echo "--- Pulling latest images ---"
            docker pull $API_IMAGE
            docker pull $WORKER_IMAGE

            echo "--- Stopping and removing old API container ---"
            docker stop $API_CONTAINER || true
            docker rm $API_CONTAINER || true
            
            echo "--- Stopping and removing old Worker container ---"
            docker stop $WORKER_CONTAINER || true
            docker rm $WORKER_CONTAINER || true

            echo "--- Starting new API container ---"
            docker run -d --name $API_CONTAINER --restart=unless-stopped -p 9001:8080 $API_IMAGE
            
            echo "--- Starting new Worker container ---"
            docker run -d --name $WORKER_CONTAINER --restart=unless-stopped $WORKER_IMAGE
