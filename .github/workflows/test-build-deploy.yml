name: Test, Build, Deploy
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - dev
      - dev2
      - gcm
      - qa
      - staging
      - main
  push:
    branches:
      - dev
      - dev2
      - gcm
      - qa
      - staging
      - main
  
  workflow_dispatch:
    inputs:
      DEPLOY_TARGET:
        description: 'Deploy to target environment'
        required: true
        type: choice
        options:
        - dm
        - gc
        - ss
        - pp
        - prod
        
jobs:
  code_quality:
    uses: sterling-retailcore-team/workflow-templates/.github/workflows/code_quality.yml@main
    secrets: inherit
    with:
      CODE_COVERAGE: 'dotnet' # specify codebase for code coverage. e.g CODE_COVERAGE: 'node' CODE_COVERAGE: 'dotnet' or CODE_COVERAGE: 'python', e.t.c

  build:
    uses: sterling-retailcore-team/workflow-templates/.github/workflows/build.yml@main
    needs: [code_quality]
    if: always() && (contains(fromJSON('["success", "skipped"]'),  needs.code_quality.result))
    with:
      GITHUB_SHA: ${GITHUB_SHA::8}
      USE_BUILDTIME_ARGS: false # toggle to use buildtime variables
      DEPLOY_VARIANT_CONTAINER: true # toggle to build a variant
      USE_VARIANT_BUILDTIME_ARGS: true # toggle to use buildtime variables for variants
      VARIANT_DOCKERFILE_NAME: "Dockerfile-consumer" # name of the variant dockerfile to build a second docker image for a second app
      VARIANT_CONTAINER_NAME: "consumer" # provide a name for the container variant if building one
      # MFE_CUSTOM_BUILD_SCRIPT: |
      #   yarn --ignore-scripts build:webpack
      MFE: false # set to true for microfrontend repositories and false for microservices
    secrets:
      BUILDTIME_ARGS: '' # if using buildtime variables, specify secrets in this format "${{ secrets.example }}"
      VARIANT_BUILDTIME_ARGS: '' # if using buildtime variables for the variant, specify secrets in this format "${{ secrets.example }}"
      GH_ACTIONS_PAT: ${{ secrets.GH_ACTIONS_PAT }} # MANDATORY, DO NOT REMOVE!
      AZURE_SP_CLIENT_ID: ${{ secrets.AZURE_SP_CLIENT_ID }} # MANDATORY, DO NOT REMOVE!
      AZURE_SP_CLIENT_SECRET: ${{ secrets.AZURE_SP_CLIENT_SECRET }} # MANDATORY, DO NOT REMOVE!
      PROD_AZURE_ACR_URL: ${{ secrets.PROD_AZURE_ACR_URL }}
      PROD_AZURE_ACR_USERNAME: ${{ secrets.PROD_AZURE_ACR_USERNAME }}
      PROD_AZURE_ACR_PASSWORD: ${{ secrets.PROD_AZURE_ACR_PASSWORD }}
      COSIGN_PRIVATE_KEY: ${{secrets.COSIGN_PRIVATE_KEY}}
      COSIGN_PASSWORD: ${{secrets.COSIGN_PASSWORD}}
      COSIGN_PUBLIC_KEY: ${{secrets.COSIGN_PUBLIC_KEY}}
  deploy:
    uses: sterling-retailcore-team/workflow-templates/.github/workflows/deploy.yml@main
    with:
      GITHUB_SHA: ${GITHUB_SHA::8}
      DEPLOY_VARIANT_CONTAINER: true # toggle to deploy a variant
      VARIANT_CONTAINER_NAME: "consumer" # provide a name for the container variant if deploying one
      MFE: false # set to true for microfrontend repositories and false for microservices
      MFE_PACKAGE_NAME: '' # for microfrontends, specify the package name to be used in the import-map
    secrets: inherit
    needs: build
    if: always() && (contains(fromJSON('["success", "skipped"]'),  needs.build.result))
  

  test:
    uses: sterling-retailcore-team/workflow-templates/.github/workflows/test.yml@main
    with:
      TYPE: '' # 'API' or 'MFE'. Leave blank for now.
    secrets: inherit
    needs: deploy
    if: always() && (contains(fromJSON('["success", "skipped"]'),  needs.deploy.result))
      
