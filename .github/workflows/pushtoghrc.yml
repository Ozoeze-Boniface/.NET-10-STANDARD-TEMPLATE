name: Build and Push Docker Image to GHCR

on:
  push:
    branches:
      - dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set owner to lowercase
        id: string
        run: echo "owner_lc=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.owner_lc }}/mandateapi:${{ github.run_number }}-dev
            ghcr.io/${{ steps.string.outputs.owner_lc }}/mandateapi:dev-latest

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile-worker # Using the worker's Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.owner_lc }}/mandateworker:${{ github.run_number }}-dev
            ghcr.io/${{ steps.string.outputs.owner_lc }}/mandateworker:dev-latest
